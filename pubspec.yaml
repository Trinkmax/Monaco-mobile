name: monaco_mobile
description: "barberOS - App de Clientes"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Supabase
  supabase_flutter: ^2.9.0

  # Security & Auth
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  crypto: ^3.0.6

  # Push Notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  qr_flutter: ^4.1.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17
  lucide_icons: ^0.257.0
  smooth_page_indicator: ^1.2.0+3

  # Geolocation
  geolocator: ^13.0.2

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.3
  connectivity_plus: ^6.1.3
  share_plus: ^10.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
